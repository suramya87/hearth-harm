name: Actions 

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tests:
    name: Run Automated Tests 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: |
          git lfs pull
          git checkout .

      # Crucial: Cache the Library inside your main folder
      - name: Cache Unity Library folder
        uses: actions/cache@v4
        with:
          path: Heart & Harm/Library
          key: Library-Tests-${{ hashFiles('Heart & Harm/Assets/**', 'Heart & Harm/Packages/**', 'Heart & Harm/ProjectSettings/**') }}
          restore-keys: |
            Library-Tests-
            Library-

      # Tells the Test Runner to step into your big folder first
      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Heart & Harm
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  # --- BUILD JOB ---
  build:
    name: Build for ${{ matrix.targetPlatform }} 
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneOSX
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: |
          git lfs pull
          git checkout .

      - name: Cache Unity Library folder
        uses: actions/cache@v4
        with:
          path: Heart & Harm/Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Heart & Harm/Assets/**', 'Heart & Harm/Packages/**', 'Heart & Harm/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Heart & Harm
          targetPlatform: ${{ matrix.targetPlatform }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: Heart & Harm/build/${{ matrix.targetPlatform }}
