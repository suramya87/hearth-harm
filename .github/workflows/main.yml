name: HeartAndHarm

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneOSX
          - StandaloneWindows64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}

      - if: matrix.targetPlatform == 'StandaloneOSX'
        name: Pack Mac Build Securely
        run: |
          cd build/StandaloneOSX
          zip -r ../../HeartAndHarm-Mac-Universal.zip .
          
      - uses: actions/upload-artifact@v4
        with:
          name: HeartAndHarm-${{ matrix.targetPlatform }}
          path: |
            ${{ matrix.targetPlatform == 'StandaloneOSX' && 'HeartAndHarm-Mac-Universal.zip' || 'build/StandaloneWindows64' }}
